name: Continuous Delivery

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install http-server
        run: npm install -g http-server

      - name: Start local server
        run: |
          http-server . -p 8080 &
          sleep 5

      - name: Run tests with Mocha
        run: |
          npm install mocha chai puppeteer

          cat <<EOF > run-tests.js
          const puppeteer = require('puppeteer');

          (async () => {
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });

            const page = await browser.newPage();

            page.on('console', msg => console.log(msg.text()));

            await page.goto('http://127.0.0.1:8080/test.html');

            await page.waitForFunction(() => {
              return document.body.innerText.includes('passing') ||
                     document.body.innerText.includes('failing');
            });

            const content = await page.content();

            if (content.includes('failing')) {
              console.log('Tests failed');
              await browser.close();
              process.exit(1);
            }

            console.log('All tests passed');
            await browser.close();
          })();
          EOF

          node run-tests.js

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
