name: CI/CD - Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install -g mocha chai jsdom

      - name: Run tests
        run: |
          node --experimental-vm-modules -e "
          const { JSDOM } = require('jsdom');
          const dom = new JSDOM('', { runScripts: 'dangerously' });
          const fs = require('fs');
          dom.window.eval(fs.readFileSync('script.js', 'utf8'));
          global.romanToInteger = dom.window.romanToInteger;
          global.integerToRoman = dom.window.integerToRoman;
          " 2>/dev/null || true

          npx mocha --require ./test-setup.cjs tests.js
