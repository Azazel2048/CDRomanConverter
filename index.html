<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conversor de Números Romanos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 40px;
            color: #333;
        }
        h1 {
            text-align: center;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            font-size: 16px;
        }
        button {
            cursor: pointer;
            background: #0078ff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background: #005fcc;
        }
        .resultado {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Conversor Romano ↔ Entero</h1>

    <label>Número romano:</label>
    <input type="text" id="romano" placeholder="Ejemplo: XIV">

    <button onclick="convertirARabico()">Convertir a entero</button>

    <label>Número entero:</label>
    <input type="number" id="entero" placeholder="Ejemplo: 14">

    <button onclick="convertirARomano()">Convertir a romano</button>

    <div class="resultado" id="resultado"></div>
</div>

<script src="script.js"></script>



</body>
</html>
